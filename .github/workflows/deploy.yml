name: Deploy

on:
  workflow_run:
    workflows: [Build]
    types: [completed]
    branches: [master]

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    concurrency:
      group: deploy-prod
      cancel-in-progress: false
    steps:
      - name: Configure SSH
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$DEPLOY_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H -p 10343 tymon343.mikrus.xyz >> ~/.ssh/known_hosts

      - name: Deploy
        env:
          IMAGE_TAG: sha-${{ github.event.workflow_run.head_sha }}
          COMMIT_MSG: ${{ github.event.workflow_run.head_commit.message }}
        run: |
          IMAGE_TAG="sha-$(echo "${IMAGE_TAG#sha-}" | cut -c1-7)"
          COMMIT_FIRST="${COMMIT_MSG%%$'\n'*}"
          ssh -i ~/.ssh/id_ed25519 -p 10343 deploy@tymon343.mikrus.xyz \
            "IMAGE_TAG=$(printf '%q' "${IMAGE_TAG}") COMMIT_MSG=$(printf '%q' "${COMMIT_FIRST}") bash -s" << 'ENDSSH'
            set -euo pipefail
            cd /opt/sos
            sed -i "s/^APP_IMAGE_TAG=.*/APP_IMAGE_TAG=${IMAGE_TAG}/" .env.production
            docker compose --env-file .env.production -f compose.yaml -f compose.prod.yaml pull app
            docker compose --env-file .env.production -f compose.yaml -f compose.prod.yaml up -d --no-deps app
            printf '%s %s %s\n' \
              "$(date -u +%FT%TZ)" \
              "${IMAGE_TAG}" \
              "${COMMIT_MSG}" \
              >> .deploy-log
          ENDSSH

      - name: Smoke test
        run: |
          ssh -i ~/.ssh/id_ed25519 -p 10343 deploy@tymon343.mikrus.xyz << 'ENDSSH'
            for i in $(seq 1 30); do
              docker compose --env-file /opt/sos/.env.production \
                -f /opt/sos/compose.yaml -f /opt/sos/compose.prod.yaml \
                exec -T app wget --no-verbose --tries=1 --spider http://localhost:3000/api/health && exit 0 # nosemgrep: trailofbits.generic.wget-unencrypted-url.wget-unencrypted-url
              sleep 2
            done
            echo "Health check timed out after 60s"; exit 1
          ENDSSH
